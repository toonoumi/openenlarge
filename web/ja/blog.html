<!DOCTYPE html>
<html lang="ja" data-i18n-title="blog.metaTitle" data-i18n-desc="blog.metaDesc">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog — OpenEnlarge</title>
<meta name="description" content="Guides, technique, and updates on inverting film scans with OpenEnlarge.">
<meta name="theme-color" content="#000000">
<link rel="icon" href="/img/favicon.png">
<link rel="canonical" href="https://openenlarge.io/ja/blog.html">
<link rel="alternate" hreflang="en" href="https://openenlarge.io/blog.html">
<link rel="alternate" hreflang="zh-Hans" href="https://openenlarge.io/zh/blog.html">
<link rel="alternate" hreflang="ja" href="https://openenlarge.io/ja/blog.html">
<link rel="alternate" hreflang="ko" href="https://openenlarge.io/ko/blog.html">
<link rel="alternate" hreflang="x-default" href="https://openenlarge.io/blog.html">
<style>
  :root{
    --bg-0:#000;
    --glass-bg:rgba(28,28,34,.55); --glass-brd:rgba(255,255,255,.08); --glass-hi:rgba(255,255,255,.04);
    --text:#e8e8ea; --text-dim:#9a9aa2; --text-soft:#c8c8ce; --text-faint:#5f5f68;
    --accent:#f49d4e; --accent-dim:#df7136; --accent-grad:linear-gradient(90deg,#f49d4e,#df7136);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;scroll-behavior:smooth;}
  body{
    background:var(--bg-0);color:var(--text);
    font:15px/1.5 -apple-system,system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}
  .glass{background:var(--glass-bg);border:1px solid var(--glass-brd);
    backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:inset 0 1px 0 var(--glass-hi),0 8px 30px rgba(0,0,0,.35);}

  /* nav */
  nav{position:sticky;top:14px;z-index:10;margin-top:14px;}
  .navbar{display:flex;align-items:center;gap:14px;padding:10px 16px;border-radius:14px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:-.01em;text-decoration:none;color:inherit;}
  .brand .mark{width:26px;height:26px;border-radius:7px;object-fit:cover;display:block;}
  .navlinks{margin-left:auto;display:flex;gap:22px;color:var(--text-dim);font-size:13.5px;}
  .navlinks a{text-decoration:none;color:inherit;}
  .navlinks a:hover,.navlinks a[aria-current="page"]{color:var(--text);}
  .lang-toggle{background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--text-dim);font:inherit;font-size:12.5px;line-height:1;padding:7px 11px;border-radius:9px;cursor:pointer;}
  .lang-toggle:hover{color:var(--text);}
  .nav-cta{padding:7px 14px;border-radius:9px;background:var(--accent-grad);color:#1a1206;font-weight:700;font-size:13px;text-decoration:none;}

  /* blog header */
  .blog-head{padding:64px 0 8px;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font:600 11.5px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);padding:6px 11px;border:1px solid var(--glass-brd);border-radius:999px;background:rgba(244,157,78,.06);}
  .blog-head h1{font-size:40px;line-height:1.05;letter-spacing:-.025em;margin:18px 0 12px;font-weight:680;}
  .blog-head .lede{color:var(--text-dim);font-size:16px;max-width:34em;margin:0;}

  /* soro embed surface */
  #soro-blog{margin:34px 0 20px;min-height:420px;}

  /* footer */
  footer{border-top:1px solid var(--glass-brd);margin-top:40px;padding:26px 0;color:var(--text-faint);font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  footer a{text-decoration:none;color:var(--text-dim);}

  @media(max-width:820px){
    .navlinks{display:none;}
    .blog-head h1{font-size:32px;}
  }
</style>
</head>
<body>

<div class="wrap">

  <nav><div class="navbar glass">
    <a class="brand" href="/ja/">
      <img class="mark" src="/img/app-logo.jpg" alt="OpenEnlarge logo">
      OpenEnlarge
    </a>
    <div class="navlinks">
      <a href="/#features" data-i18n="nav.features">Features</a>
      <a href="/#how" data-i18n="nav.how">How it works</a>
      <a href="/#roadmap" data-i18n="nav.roadmap">Roadmap</a>
      <a href="/ja/blog.html" aria-current="page" data-i18n="nav.blog">Blog</a>
      <a href="/docs/ja/index.html" data-i18n="nav.docs">Docs</a>
      <a href="https://github.com/mohaelder/openenlarge">GitHub</a>
    </div>
    <button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language / 切换语言">中文</button>
    <a class="nav-cta" id="nav-download" href="https://github.com/mohaelder/openenlarge/releases/latest" data-i18n="nav.cta">Download</a>
  </div></nav>

  <header class="blog-head">
    <span class="eyebrow" data-i18n="blog.eyebrow">◆ Blog</span>
    <h1 data-i18n="blog.h1">From the darkroom.</h1>
    <p class="lede" data-i18n="blog.lede">Guides, technique, and updates on inverting film scans with OpenEnlarge.</p>
  </header>

  <!-- Soro embedded blog widget -->
  <div id="soro-blog"></div>
  <script src="https://app.trysoro.com/api/embed/3e78e36b-e01e-49a5-8979-f6013667e727?theme=dark" defer></script>

  <footer>
    <span data-i18n-html="footer.left">© 2026 OpenEnlarge · <a href="https://github.com/mohaelder/openenlarge/blob/main/LICENSE">MIT</a></span>
    <span data-i18n-html="footer.right"><a href="https://github.com/mohaelder/openenlarge">GitHub</a> · <a href="https://github.com/mohaelder/openenlarge/releases/latest">Releases</a></span>
  </footer>

</div>

<script src="/i18n.js"></script>
<script src="/releases.js"></script>
</body>
</html>
