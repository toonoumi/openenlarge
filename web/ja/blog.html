<style>
  :root{
    --bg-0:#000;
    --glass-bg:rgba(28,28,34,.55); --glass-brd:rgba(255,255,255,.08); --glass-hi:rgba(255,255,255,.04);
    --text:#e8e8ea; --text-dim:#9a9aa2; --text-soft:#c8c8ce; --text-faint:#5f5f68;
    --accent:#f49d4e; --accent-dim:#df7136; --accent-grad:linear-gradient(90deg,#f49d4e,#df7136);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;scroll-behavior:smooth;}
  body{
    background:var(--bg-0);color:var(--text);
    font:15px/1.5 -apple-system,system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}
  .glass{background:var(--glass-bg);border:1px solid var(--glass-brd);
    backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:inset 0 1px 0 var(--glass-hi),0 8px 30px rgba(0,0,0,.35);}

  /* nav */
  nav{position:sticky;top:14px;z-index:10;margin-top:14px;}
  .navbar{display:flex;align-items:center;gap:14px;padding:10px 16px;border-radius:14px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:-.01em;text-decoration:none;color:inherit;}
  .brand .mark{width:26px;height:26px;border-radius:7px;object-fit:cover;display:block;}
  .navlinks{margin-left:auto;display:flex;gap:22px;color:var(--text-dim);font-size:13.5px;}
  .navlinks a{text-decoration:none;color:inherit;}
  .navlinks a:hover,.navlinks a[aria-current="page"]{color:var(--text);}
  .langmenu{position:relative;display:flex;align-items:center;}
  .langmenu summary{list-style:none;cursor:pointer;display:flex;align-items:center;color:var(--text-dim);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);border-radius:9px;padding:6px 8px;}
  .langmenu summary::-webkit-details-marker{display:none;}
  .langmenu summary::after{content:"\25BE";font-size:9px;margin-left:4px;opacity:.65;}
  .langmenu summary:hover{color:var(--text);}
  .langmenu summary .globe{display:block;width:17px;height:17px;}
  .langmenu[open] .langmenu-list{display:flex;}
  .langmenu-list{display:none;position:absolute;right:0;top:calc(100% + 6px);flex-direction:column;gap:2px;background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:10px;padding:6px;min-width:128px;box-shadow:0 8px 30px rgba(0,0,0,.45);z-index:20;}
  .langmenu-list a{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:6px;text-decoration:none;color:var(--text-dim);font-size:13px;white-space:nowrap;}
  .langmenu-list a::before{content:"";width:1em;flex:0 0 auto;text-align:center;}
  .langmenu-list a:hover{color:var(--text);background:rgba(255,255,255,.05);}
  .langmenu-list a[aria-current="true"]{color:var(--text);font-weight:600;}
  .langmenu-list a[aria-current="true"]::before{content:"\2713";}
  .nav-cta{padding:7px 14px;border-radius:9px;background:var(--accent-grad);color:#1a1206;font-weight:700;font-size:13px;text-decoration:none;}

  /* blog header */
  .blog-head{padding:64px 0 8px;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font:600 11.5px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);padding:6px 11px;border:1px solid var(--glass-brd);border-radius:999px;background:rgba(244,157,78,.06);}
  .blog-head h1{font-size:40px;line-height:1.05;letter-spacing:-.025em;margin:18px 0 12px;font-weight:680;}
  .blog-head .lede{color:var(--text-dim);font-size:16px;max-width:34em;margin:0;}

  /* soro embed surface */
  #soro-blog{margin:34px 0 20px;min-height:420px;}

  /* footer */
  footer{border-top:1px solid var(--glass-brd);margin-top:40px;padding:26px 0;color:var(--text-faint);font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  footer a{text-decoration:none;color:var(--text-dim);}

  @media(max-width:820px){
    .navlinks{display:none;}
    .blog-head h1{font-size:32px;}
  }
</style>
</head>

  </div></nav>

  <header class="blog-head">
    <span class="eyebrow" data-i18n="blog.eyebrow">◆ ブログ</span>
    <h1 data-i18n="blog.h1">暗室から。</h1>
