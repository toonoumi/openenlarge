name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14          # Apple Silicon only
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    # Promoted to job level so the value is visible to the Windows step's `if`
    # guard (a step's own step-level `env:` is NOT available to that step's `if`).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      # Promoted to job level so the R2 upload step's `if` guard can see it
      # (step-level env is not visible to that step's own `if`).
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          "WIN_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compute Tauri build args
        shell: bash
        run: |
          ARGS="${{ matrix.args }}"
          if [ -n "$WIN_CERT_THUMBPRINT" ]; then
            ARGS="$ARGS --config {\"bundle\":{\"windows\":{\"certificateThumbprint\":\"$WIN_CERT_THUMBPRINT\",\"timestampUrl\":\"http://timestamp.digicert.com\",\"digestAlgorithm\":\"sha256\"}}}"
          fi
          echo "TAURI_ARGS=$ARGS" >> "$GITHUB_ENV"
          # ultrahdr-sys applies a `no-threads` source patch via `patch`; on the
          # Windows runner that resolves to Strawberry Perl's patch.exe, which
          # crashes (assertion in patch 2.5.9). We build the normal *threaded*
          # libultrahdr, so the patch is irrelevant — skip it to dodge the broken
          # tool. macOS/Linux have a working `patch` and apply it fine.
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            echo "ULTRAHDR_SKIP_PATCHES=1" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (absent => unsigned build, no failure)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing (absent => updater artifacts unsigned; auto-update disabled, build still succeeds)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenEnlarge ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your OS below. See the README for install notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ env.TAURI_ARGS }}

      # Mirror the freshly built installers to Cloudflare R2 (bucket "public-files")
      # so China users can download without hitting throttled github.com. Skipped
      # automatically when the R2 secrets are absent, so the release still succeeds.
      - name: Upload installers to Cloudflare R2
        if: env.R2_ACCESS_KEY_ID != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://82bb48d5a10bdf3b7d37cce26744d511.r2.cloudflarestorage.com
          R2_BUCKET: public-files
          ARTIFACTS: ${{ steps.tauri.outputs.artifactPaths }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "$ARTIFACTS" | jq -r '.[]' | while read -r f; do
            [ -f "$f" ] || { echo "skip (not a file): $f"; continue; }
            name="$(basename "$f")"
            echo "Uploading $name -> s3://$R2_BUCKET/$TAG/$name"
            aws s3 cp "$f" "s3://$R2_BUCKET/$TAG/$name" --endpoint-url "$R2_ENDPOINT"
          done
