name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14          # Apple Silicon only
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    # Promoted to job level so the value is visible to the Windows step's `if`
    # guard (a step's own step-level `env:` is NOT available to that step's `if`).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libappindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          "WIN_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compute Tauri build args
        shell: bash
        run: |
          ARGS="${{ matrix.args }}"
          if [ -n "$WIN_CERT_THUMBPRINT" ]; then
            ARGS="$ARGS --config {\"bundle\":{\"windows\":{\"certificateThumbprint\":\"$WIN_CERT_THUMBPRINT\",\"timestampUrl\":\"http://timestamp.digicert.com\",\"digestAlgorithm\":\"sha256\"}}}"
          fi
          echo "TAURI_ARGS=$ARGS" >> "$GITHUB_ENV"
          # ultrahdr-sys applies a `no-threads` source patch via `patch`; on the
          # Windows runner that resolves to Strawberry Perl's patch.exe, which
          # crashes (assertion in patch 2.5.9). We build the normal *threaded*
          # libultrahdr, so the patch is irrelevant — skip it to dodge the broken
          # tool. macOS/Linux have a working `patch` and apply it fine.
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            echo "ULTRAHDR_SKIP_PATCHES=1" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (absent => unsigned build, no failure)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing (absent => updater artifacts unsigned; auto-update disabled, build still succeeds)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenEnlarge ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your OS below. See the README for install notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ env.TAURI_ARGS }}

  # After all platforms build, mirror every release asset (installers + updater
  # binaries) to Cloudflare R2, publish the URL-rewritten updater manifest
  # (latest.json) to the stable R2 path the app polls, generate the same-origin
  # web/releases.json the landing page reads (no api.github.com at runtime), then
  # commit it and redeploy the Pages site. Mirror steps skip if R2 secrets absent.
  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
      DL_BASE: https://download.aako.world
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://82bb48d5a10bdf3b7d37cce26744d511.r2.cloudflarestorage.com
      R2_BUCKET: public-files
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -D dist --clobber
          ls -lh dist

      - name: Mirror assets to R2 + publish updater manifest
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          set -euo pipefail
          # Mirror every asset except latest.json (uploaded after URL rewrite).
          for f in dist/*; do
            name="$(basename "$f")"
            [ "$name" = "latest.json" ] && continue
            echo "Uploading $name -> s3://$R2_BUCKET/$TAG/$name"
            aws s3 cp "$f" "s3://$R2_BUCKET/$TAG/$name" --endpoint-url "$R2_ENDPOINT"
          done
          # Rewrite the updater manifest's URLs to the R2 mirror. Signatures sign
          # file content (not URLs), so they stay valid. Publish to the stable root
          # path (the app's updater endpoint) plus a versioned copy.
          if [ -f dist/latest.json ]; then
            jq --arg base "$DL_BASE/$TAG/" \
               '.platforms |= with_entries(.value.url = ($base + (.value.url | split("/") | last)))' \
               dist/latest.json > dist/latest.rewritten.json
            aws s3 cp dist/latest.rewritten.json "s3://$R2_BUCKET/latest.json" \
              --endpoint-url "$R2_ENDPOINT" --content-type application/json
            aws s3 cp dist/latest.rewritten.json "s3://$R2_BUCKET/$TAG/latest.json" \
              --endpoint-url "$R2_ENDPOINT" --content-type application/json
          fi

      - name: Build web/releases.json (download-page manifest)
        run: |
          set -euo pipefail
          names=$(ls dist)
          pick() { echo "$names" | grep -iE "$1" | head -1 || true; }
          mac=$(pick '\.dmg$')
          win=$(pick '_x64_en-US\.msi$'); [ -n "$win" ] || win=$(pick '\.msi$'); [ -n "$win" ] || win=$(pick '\.exe$')
          lin=$(pick '\.AppImage$')
          url() { [ -n "$1" ] && printf '%s/%s/%s' "$DL_BASE" "$TAG" "$1" || printf ''; }
          jq -n --arg tag "$TAG" \
                --arg mac "$(url "$mac")" --arg win "$(url "$win")" --arg lin "$(url "$lin")" '
            { tag: $tag, assets: (
                {}
                + (if $mac != "" then {macos: $mac} else {} end)
                + (if $win != "" then {windows: $win} else {} end)
                + (if $lin != "" then {linux: $lin} else {} end)
            )}' > web/releases.json
          echo "Generated web/releases.json:"; cat web/releases.json

      - name: Commit releases.json
        run: |
          set -euo pipefail
          if git diff --quiet -- web/releases.json; then echo "releases.json unchanged"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/releases.json
          git commit -m "chore(web): release manifest for ${{ github.ref_name }}"
          git push origin HEAD:main

      # Deploy directly (a push made with GITHUB_TOKEN does not trigger
      # deploy-web.yml), so the live site updates regardless.
      - name: Deploy site with fresh manifest
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 82bb48d5a10bdf3b7d37cce26744d511
          command: pages deploy web --project-name=openenlarge --branch=main --commit-dirty=true
