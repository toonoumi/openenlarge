<svg viewBox="0 0 640 320" role="img" aria-label="Density versus light on a stop-spaced axis: a straight line in which each doubling of light — one photographic stop — adds the same 0.30 of density. Light values 1, 2, 4, 8, 16 are equally spaced on the x-axis because the axis is already stop-spaced (logarithmic). The five data points fall on evenly-spaced y positions at D = 0.0, 0.3, 0.6, 0.9, 1.2, confirming that each stop adds exactly log₁₀(2) ≈ 0.30 of optical density." xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="320" rx="12" fill="#141418"/>

  <!-- Chart area margins: left 70, right 24, top 24, bottom 56 -->
  <!-- Plot area: x 70..616, y 24..264 — width 546, height 240 -->

  <!-- Stop gridlines: x positions for light values 1,2,4,8,16 mapped logarithmically
       log2(1)=0, log2(2)=1, log2(4)=2, log2(8)=3, log2(16)=4
       x = 70 + (log2(v)/4) * 546
       v=1 → x=70, v=2 → x=206.5, v=4 → x=343, v=8 → x=479.5, v=16 → x=616
  -->

  <!-- Horizontal density gridlines: y positions for D=0.0,0.3,0.6,0.9,1.2 evenly spaced
       y = 264 - (D/1.2)*240  (1.2 = 4 stops × 0.30 per stop)
       D=0.0 → y=264, D=0.3 → y=204, D=0.6 → y=144, D=0.9 → y=84, D=1.2 → y=24
  -->

  <!-- Vertical stop gridlines (light values) -->
  <line x1="70"    y1="24" x2="70"    y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="206.5" y1="24" x2="206.5" y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="343"   y1="24" x2="343"   y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="479.5" y1="24" x2="479.5" y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="616"   y1="24" x2="616"   y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>

  <!-- Horizontal density gridlines -->
  <line x1="70" y1="264" x2="616" y2="264" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="70" y1="204" x2="616" y2="204" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="70" y1="144" x2="616" y2="144" stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="70" y1="84"  x2="616" y2="84"  stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>
  <line x1="70" y1="24"  x2="616" y2="24"  stroke="#9a9aa2" stroke-width="0.5" opacity="0.4"/>

  <!-- Stop connector lines: each +1 stop on x = +0.30 density step on y (equal spacing)
       Highlight the equal-step property with dashed connectors from grid intersections
  -->
  <!-- Connecting dots at stop intersections (v=1,D=0.0), (v=2,D=0.3), (v=4,D=0.6), (v=8,D=0.9), (v=16,D=1.2) -->
  <circle cx="70"    cy="264" r="4" fill="#f49d4e"/>
  <circle cx="206.5" cy="204" r="4" fill="#f49d4e"/>
  <circle cx="343"   cy="144" r="4" fill="#f49d4e"/>
  <circle cx="479.5" cy="84"  r="4" fill="#f49d4e"/>
  <circle cx="616"   cy="24"  r="4" fill="#f49d4e"/>

  <!-- The line y = 264 - (log2(t) / 4)*240 for t from 1..16 is STRAIGHT on a stop-spaced x-axis
       because x = 70 + (log2(t)/4)*546 — both x and y are proportional to log2(t).
       Sampled at integer and half-stop positions for a smooth polyline.
       t values: 1, 1.41, 2, 2.83, 4, 5.66, 8, 11.31, 16
       x = 70 + (log2(t)/4)*546
       y = 264 - (log2(t)/4)*240
       (1, D=0.0):   x=70,    y=264
       (1.41,D=0.15):x=138.3, y=234
       (2,  D=0.3):  x=206.5, y=204
       (2.83,D=0.45):x=274.8, y=174
       (4,  D=0.6):  x=343,   y=144
       (5.66,D=0.75):x=411.3, y=114
       (8,  D=0.9):  x=479.5, y=84
       (11.31,D=1.05):x=547.8,y=54
       (16, D=1.2):  x=616,   y=24
  -->
  <polyline
    points="70,264 138.3,234 206.5,204 274.8,174 343,144 411.3,114 479.5,84 547.8,54 616,24"
    fill="none" stroke="#f49d4e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "1 stop" bracket annotations between v=1→2 and v=2→4 on x-axis -->
  <!-- Between x=70 and x=206.5, below y=264 -->
  <line x1="70"    y1="275" x2="70"    y2="282" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="206.5" y1="275" x2="206.5" y2="282" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="70"    y1="278" x2="206.5" y2="278" stroke="#9a9aa2" stroke-width="1"/>
  <text x="138.3" y="295" font-family="ui-monospace,monospace" font-size="10" fill="#9a9aa2" text-anchor="middle">+1 stop</text>

  <!-- Between x=206.5 and x=343, same level -->
  <line x1="206.5" y1="275" x2="206.5" y2="282" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="343"   y1="275" x2="343"   y2="282" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="206.5" y1="278" x2="343"   y2="278" stroke="#9a9aa2" stroke-width="1"/>
  <text x="274.8" y="295" font-family="ui-monospace,monospace" font-size="10" fill="#9a9aa2" text-anchor="middle">+1 stop</text>

  <!-- Y-axis density labels (true optical density: each stop = log₁₀(2) ≈ 0.30) -->
  <text x="60" y="268" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="end">D 0.0</text>
  <text x="60" y="208" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="end">D 0.3</text>
  <text x="60" y="148" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="end">D 0.6</text>
  <text x="60" y="88"  font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="end">D 0.9</text>
  <text x="60" y="28"  font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="end">D 1.2</text>

  <!-- Y-axis label -->
  <text x="14" y="144" font-family="ui-monospace,monospace" font-size="11" fill="#e8e8ea" text-anchor="middle" transform="rotate(-90,14,144)">density  D = log₁₀(light)</text>

  <!-- X-axis light value labels -->
  <text x="70"    y="310" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="middle">1</text>
  <text x="206.5" y="310" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="middle">2</text>
  <text x="343"   y="310" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="middle">4</text>
  <text x="479.5" y="310" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="middle">8</text>
  <text x="616"   y="310" font-family="ui-monospace,monospace" font-size="11" fill="#9a9aa2" text-anchor="middle">16</text>

  <!-- X-axis label -->
  <text x="343" y="316" font-family="ui-monospace,monospace" font-size="11" fill="#e8e8ea" text-anchor="middle" dy="0">linear light (stops ×2)</text>

  <!-- Callout: "+1 stop → +0.30 D" annotation on right side — every interval is the same -->
  <!-- Bracket for equal y spacing on right side, D=0.0→0.3 (one stop) -->
  <line x1="624" y1="264" x2="630" y2="264" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="624" y1="204" x2="630" y2="204" stroke="#9a9aa2" stroke-width="1"/>
  <line x1="627" y1="264" x2="627" y2="204" stroke="#9a9aa2" stroke-width="1"/>
  <text x="634" y="232" font-family="ui-monospace,monospace" font-size="9" fill="#f49d4e" text-anchor="start">+1 stop</text>
  <text x="634" y="243" font-family="ui-monospace,monospace" font-size="9" fill="#f49d4e" text-anchor="start">→ +0.30 D</text>
</svg>
